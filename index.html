<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <header>
        <h1>Certificate Generator</h1>
        <p>Create and download your certificate easily!</p>
    </header>
    <main>
        <form id="certificateForm">
            <label for="name">Name:</label>
            <input type="text" id="name" required>

            <label for="course">Course:</label>
            <input type="text" id="course" required>

            <label for="date">Date:</label>
            <input type="date" id="date" required>

            <button type="submit">Generate Certificate</button>
        </form>
        <div id="preview" style="display:none;">
            <h2>Preview:</h2>
            <div id="certificatePreview"></div>
            <button id="downloadBtn" style="display:none;">Download Certificate</button>
        </div>
    </main>
    <script>
        document.getElementById('certificateForm').onsubmit = function(event) {
            event.preventDefault();
            generateCertificate();
        };

        function generateCertificate() {
            const name = document.getElementById('name').value;
            const course = document.getElementById('course').value;
            const date = document.getElementById('date').value;

            const certificateHTML = `<div style='border: 1px solid #000; padding: 20px; text-align: center;'>\n                <h1>Certificate of Completion</h1>\n                <p>This is to certify that</p>\n                <h2>${name}</h2>\n                <p>has completed the course</p>\n                <h3>${course}</h3>\n                <p>Date: ${date}</p>\n            </div>`;

            document.getElementById('certificatePreview').innerHTML = certificateHTML;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline';
        }

        document.getElementById('downloadBtn').onclick = function() {
            const zip = new JSZip();
            zip.file('certificate.html', document.getElementById('certificatePreview').innerHTML);

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                saveAs(content, 'certificate.zip');
            });
        };
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px 15px; }
    </style>
</body>
</html>
